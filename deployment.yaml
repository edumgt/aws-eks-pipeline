---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nodejs-app
  name: nodejs-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
        - name: status
          image: 086015456585.dkr.ecr.ap-northeast-2.amazonaws.com/edumgt-ecr
          ports:
            - containerPort: 8080
